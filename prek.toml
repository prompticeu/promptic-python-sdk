default_install_hook_types = ["pre-commit", "commit-msg", "post-checkout", "post-merge", "post-rewrite"]

# ─────────────────────────────────────────────────────────────────────────────
# Priority 0: Builtin Rust-native hooks (instant startup, no env setup)
# ─────────────────────────────────────────────────────────────────────────────
[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]
priority = 0

[[repos.hooks]]
id = "check-added-large-files"
priority = 0

[[repos.hooks]]
id = "check-case-conflict"
priority = 0

[[repos.hooks]]
id = "end-of-file-fixer"
priority = 0

[[repos.hooks]]
id = "fix-byte-order-marker"
priority = 0

[[repos.hooks]]
id = "check-json"
priority = 0

[[repos.hooks]]
id = "check-toml"
priority = 0

[[repos.hooks]]
id = "check-yaml"
args = ["--allow-multiple-documents"]
priority = 0

[[repos.hooks]]
id = "mixed-line-ending"
priority = 0

[[repos.hooks]]
id = "check-symlinks"
priority = 0

[[repos.hooks]]
id = "check-merge-conflict"
args = ["--assume-in-merge"]
priority = 0

[[repos.hooks]]
id = "detect-private-key"
priority = 0

# ─────────────────────────────────────────────────────────────────────────────
# Priority 0: Hooks from pre-commit-hooks repo (no builtin equivalent)
# ─────────────────────────────────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"

[[repos.hooks]]
id = "check-ast"
priority = 0

[[repos.hooks]]
id = "debug-statements"
priority = 0

# ─────────────────────────────────────────────────────────────────────────────
# Priority 10: Formatters (run together, before linters)
# ─────────────────────────────────────────────────────────────────────────────
[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
description = "Formatting python"
entry = "uv run ruff format"
types_or = ["python", "pyi"]
language = "system"
priority = 10

# ─────────────────────────────────────────────────────────────────────────────
# Priority 20: Linters (slowest hooks, run in parallel with each other)
# ─────────────────────────────────────────────────────────────────────────────

[[repos.hooks]]
id = "ruff-lint"
name = "ruff lint"
description = "Linting and autofixing common python rules"
entry = "uv run ruff check"
args = ["--exit-non-zero-on-fix"]
types_or = ["python", "pyi"]
language = "system"
priority = 20

[[repos.hooks]]
id = "ty"
name = "ty"
description = "Extremely fast type checker for Python"
entry = "uv run ty check"
types = ["python"]
language = "system"
stages = ["pre-commit"]
priority = 20

# ─────────────────────────────────────────────────────────────────────────────
# Stage-specific hooks (post-checkout, post-merge, commit-msg)
# ─────────────────────────────────────────────────────────────────────────────

[[repos.hooks]]
id = "uv-sync"
name = "uv-sync"
description = "Automatically run 'uv sync' after a checkout, pull or rebase"
entry = "uv sync"
args = ["--all-extras", "--locked"]
language = "system"
always_run = true
pass_filenames = false
stages = ["post-checkout", "post-merge", "post-rewrite"]

[[repos.hooks]]
id = "commitizen"
name = "commitizen"
description = "Validate commit message format"
entry = "uv run cz check"
args = ["--allow-abort", "--commit-msg-file"]
stages = ["commit-msg"]
language = "system"
