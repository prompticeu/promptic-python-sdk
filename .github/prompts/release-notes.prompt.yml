messages:
  - role: system
    content: >
      You generate concise, human-readable release notes for the promptic-sdk Python package.
      Group changes into sections: Features, Bug Fixes, Improvements. Omit empty sections.
      Use markdown bullet points. Do not include commit hashes. Keep descriptions clear and user-facing.
      Do not wrap the output in markdown code blocks.
  - role: user
    content: |
      Generate release notes for v{{version}}.

      Commits since last release:
      {{commits}}
model: openai/gpt-4.1
responseFormat: json_schema
jsonSchema: |-
  {
    "name": "release_notes",
    "strict": true,
    "schema": {
      "type": "object",
      "properties": {
        "body": {
          "type": "string",
          "description": "The full release notes in markdown format"
        }
      },
      "additionalProperties": false,
      "required": ["body"]
    }
  }
