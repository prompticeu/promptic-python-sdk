name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  models: read

jobs:
  release:
    name: Bump, Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-local-path: /tmp/.uv-cache
          version: "0.5.26"

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          uv run cz bump --yes 2>&1 || {
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed — no conventional commits since last tag."
            exit 0
          }
          uv lock
          git add uv.lock
          git commit --amend --no-edit
          VERSION=$(uv run cz version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Collect commits and build prompt
        if: steps.bump.outputs.skip != 'true'
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          COMMITS=$(git log ${PREV_TAG:+${PREV_TAG}..HEAD} --pretty=format:'- %s')
          cat > /tmp/release-prompt.txt <<PROMPT_EOF
          Generate concise, human-readable release notes for promptic-sdk v${{ steps.bump.outputs.version }}.
          Group changes into sections: Features, Bug Fixes, Improvements. Omit empty sections.
          Use markdown bullet points. Do not include commit hashes. Keep descriptions clear and user-facing.

          Commits since last release:
          ${COMMITS}
          PROMPT_EOF

      - name: Generate release notes with AI
        if: steps.bump.outputs.skip != 'true'
        id: ai
        uses: actions/ai-inference@v1
        with:
          prompt-file: /tmp/release-prompt.txt
          model: openai/gpt-4.1

      - name: Extract release notes
        if: steps.bump.outputs.skip != 'true'
        id: changelog
        env:
          AI_RESPONSE: ${{ steps.ai.outputs.response }}
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$AI_RESPONSE" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        if: steps.bump.outputs.skip != 'true'
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          DATE=$(date +%Y-%m-%d)
          HEADER="## v${VERSION} (${DATE})"
          if [ -f CHANGELOG.md ]; then
            tail -n +2 CHANGELOG.md > /tmp/old-changelog-body.md
            printf '# Changelog\n\n%s\n\n%s\n%s' "$HEADER" "$RELEASE_BODY" "$(cat /tmp/old-changelog-body.md)" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s\n\n%s\n' "$HEADER" "$RELEASE_BODY" > CHANGELOG.md
          fi
          git add CHANGELOG.md
          git commit -m "docs: update changelog for v${VERSION}"

      - name: Push version commit, changelog, and tag
        if: steps.bump.outputs.skip != 'true'
        run: git push origin HEAD --follow-tags

      - name: Build package
        if: steps.bump.outputs.skip != 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.bump.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: dist/*
